<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wonder</title>
    <style>
      /* ── the codex design tokens — one source of truth for the naturalist's-codex UI ── */
      :root {
        --abyss: 6, 10, 16;
        --tide-hi: rgba(23, 42, 54, 0.97); --tide-lo: rgba(8, 15, 22, 0.98);
        --ink: #e4ecf2; --ink-bright: #e8f2ee;
        --lumen: 127, 224, 196;   /* mint  → rgb(var(--lumen)) · rgba(var(--lumen), a) */
        --firefly: 244, 201, 121; /* gold */
        --rose: 231, 154, 162;    /* warn */
        --panel: linear-gradient(180deg, var(--tide-hi), var(--tide-lo));
        --frame: 0 0 0 1px rgba(var(--lumen), 0.22), 0 0 0 5px rgba(var(--abyss), 0.6), 0 34px 90px -20px rgba(0, 0, 0, 0.85), inset 0 1px 0 rgba(var(--lumen), 0.14);
        --radius: 4px;
        --serif: Georgia, "Iowan Old Style", serif;
        --mono: ui-monospace, Menlo, monospace;
      }
      html, body { margin: 0; height: 100%; background: #0a0e14; overflow: hidden; }
      canvas { display: block; image-rendering: pixelated; }
      #seed-label {
        position: fixed; left: 12px; bottom: 10px;
        max-width: 34vw; line-height: 1.5;
        font: 12px monospace; color: rgba(255, 255, 255, 0.55);
        user-select: none;
      }
      #hud {
        position: fixed; right: 12px; bottom: 10px;
        max-width: 58vw; line-height: 1.5;
        font: 12px monospace; color: rgba(255, 255, 255, 0.75);
        text-align: right; user-select: none;
      }
      #hud .dot {
        display: inline-block; width: 10px; height: 10px;
        border-radius: 2px; margin-left: 4px; vertical-align: middle;
        border: 1px solid rgba(255, 255, 255, 0.35);
      }
      /* the debug readout (backtick): selectable, so the seed can be copied */
      #dev {
        position: fixed; left: 12px; top: 12px; display: none;
        font: 11px/1.55 monospace; color: rgba(214, 232, 246, 0.94);
        background: rgba(6, 10, 16, 0.86); border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px; padding: 9px 13px; white-space: pre; max-width: 52vw;
        pointer-events: auto; user-select: text; z-index: 6;
      }
      #hud .msg { display: block; margin-bottom: 6px; color: rgba(255, 255, 255, 0.9); }
      /* the hotbar — three functional slots (hand · hoe · pouch), codex-styled */
      #hud .hotbar { display: inline-flex; align-items: stretch; gap: 6px; vertical-align: middle; }
      #hud .hb-slot {
        position: relative; display: inline-flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 3px;
        width: 46px; height: 46px; padding: 3px; border-radius: 7px;
        color: rgba(228, 236, 242, 0.62);
        background: linear-gradient(180deg, rgba(19, 35, 47, 0.72), rgba(8, 15, 22, 0.82));
        box-shadow: inset 0 0 0 1px rgba(var(--lumen), 0.1);
      }
      #hud .hb-slot.on {
        color: var(--ink-bright);
        box-shadow: inset 0 0 0 1px rgb(var(--lumen)), 0 0 15px rgba(var(--lumen), 0.3);
      }
      #hud .hb-k { position: absolute; top: 2px; left: 5px; font-size: 9px; color: rgba(228, 236, 242, 0.3); }
      #hud .hb-slot.on .hb-k { color: rgb(var(--lumen)); }
      #hud .hb-ico { width: 22px; height: 22px; display: block; }
      #hud .hb-dot { width: 15px; height: 15px; border-radius: 4px; box-shadow: 0 0 8px currentColor; }
      #hud .hb-dot.empty { box-shadow: inset 0 0 0 1px rgba(228, 236, 242, 0.28); }
      #hud .hb-ct { position: absolute; bottom: 2px; right: 5px; font-size: 10px; color: rgb(var(--firefly)); }
      #hud .hb-n {
        font-size: 8px; letter-spacing: 0.02em; color: rgba(228, 236, 242, 0.55);
        max-width: 42px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      #hud .hb-slot.on .hb-n { color: rgba(228, 236, 242, 0.82); }
      #hud .hb-carry { align-self: center; margin-left: 6px; font-size: 11px; color: rgba(228, 236, 242, 0.42); }
      #hud .hb-carry b { color: rgba(228, 236, 242, 0.72); font-weight: 400; }
      #hud .hb-legend { display: block; margin-top: 7px; font-size: 11px; color: rgba(228, 236, 242, 0.42); }
      #hud .hb-legend b { color: rgb(var(--lumen)); font-weight: 400; }
      #inspect {
        display: none;
        position: fixed; left: 50%; bottom: 36px; transform: translateX(-50%);
        max-width: min(920px, 92vw); max-height: 60vh; overflow-y: auto;
        background: var(--panel); box-shadow: 0 0 0 1px rgba(var(--lumen), 0.18), 0 14px 44px -14px rgba(0, 0, 0, 0.72);
        border-radius: var(--radius);
        padding: 14px 16px; font: 12px var(--mono); color: var(--ink);
      }
      #inspect .inspect-title { font: 10px var(--mono); letter-spacing: 0.2em; text-transform: uppercase;
        color: rgb(var(--lumen)); opacity: 0.72; margin: 13px 0 6px; display: flex; align-items: center; gap: 8px; }
      #inspect .inspect-title:first-child { margin-top: 0; }
      #inspect .inspect-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(var(--lumen), 0.2), transparent); }
      #inspect .inspect-grid {
        display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
      }
      #inspect .inspect-card { width: 110px; text-align: center; }
      /* every card's canvas is drawn at its own true size (cropped to sprite
         bounds in inspect.ts) — no shared frame, so no stretching, no dead bands */
      #inspect canvas { image-rendering: pixelated; }
      #inspect canvas.critter-canvas { width: 96px; height: auto; }
      #inspect .inspect-name { margin-top: 4px; color: var(--ink-bright); }
      #inspect .inspect-traits { opacity: 0.65; margin-top: 2px; line-height: 1.5; }
      #inspect .inspect-gather {
        margin-top: 6px; padding: 2px 10px;
        font: 11px var(--mono); color: var(--ink); cursor: pointer;
        background: rgba(var(--lumen), 0.08);
        border: 1px solid rgba(var(--lumen), 0.25); border-radius: 4px;
      }
      #inspect .inspect-gather:hover:enabled { background: rgba(var(--lumen), 0.16); }
      #inspect .inspect-gather:disabled { opacity: 0.5; cursor: default; }
      #inspect .inspect-hint { opacity: 0.45; margin-top: 12px; text-align: center; }
      /* the fold made honest: a soft fade + "more ↓" while the card holds more below */
      #inspect .inspect-more {
        position: sticky; bottom: -14px; margin: 0 -16px -14px; padding: 26px 0 6px;
        text-align: center; pointer-events: none;
        font: 11px var(--mono); letter-spacing: 0.08em; color: rgba(var(--lumen), 0.85);
        background: linear-gradient(180deg, rgba(8, 15, 22, 0), var(--tide-lo) 72%);
        opacity: 1; transition: opacity 0.25s ease;
      }
      #inspect .inspect-more.gone { opacity: 0; }
      #murmur {
        position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%);
        max-width: min(640px, 84vw); text-align: center;
        font: italic 14px Georgia, serif; color: rgba(255, 255, 255, 0.82);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        opacity: 0; transition: opacity 2.2s ease; pointer-events: none;
        line-height: 1.5;
      }
      #murmur.visible { opacity: 1; }
      /* a panel opened mid-murmur: retire it at once, no lingering fade */
      #murmur.hushed { opacity: 0; transition: none; }
      #murmur .murmur-attr { font-size: 11px; opacity: 0.6; margin-top: 4px; }
      #anthology {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(560px, 88vw); max-height: 72vh; overflow-y: auto;
        background: var(--panel); box-shadow: var(--frame);
        border-radius: var(--radius);
        padding: 18px 22px; color: var(--ink); font-family: var(--serif);
      }
      #anthology .anth-title { font-variant: small-caps; letter-spacing: 0.08em; font-size: 19px; color: var(--ink-bright); }
      #anthology .anth-epigraph {
        font: italic 12px Georgia, serif; opacity: 0.5;
        margin: 4px 0 16px; padding-bottom: 10px;
        border-bottom: 1px solid rgba(var(--lumen), 0.14);
      }
      #anthology .anth-entry { margin-bottom: 14px; }
      #anthology .anth-text {
        font: italic 13px Georgia, serif; line-height: 1.5;
        color: rgba(255, 255, 255, 0.85);
      }
      #anthology .anth-attr { font: 11px Georgia, serif; opacity: 0.6; margin-top: 2px; }
      #anthology .anth-place { font: 10px monospace; opacity: 0.38; margin-top: 1px; }
      #anthology .anth-empty { font: italic 13px Georgia, serif; opacity: 0.6; }
      #anthology .anth-hint { font: 11px monospace; opacity: 0.45; margin-top: 12px; text-align: center; }
      #journal {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(720px, 92vw); max-height: 76vh; overflow-y: auto;
        background: var(--panel); box-shadow: var(--frame);
        border-radius: var(--radius);
        padding: 18px 22px; color: var(--ink); font-family: var(--serif);
      }
      #journal .codex-title, #help .codex-title { font-variant: small-caps; letter-spacing: 0.08em; font-size: 19px; color: var(--ink-bright); }
      #journal .anth-title, #help .anth-title { font: 10px var(--mono); letter-spacing: 0.22em; text-transform: uppercase; color: rgb(var(--lumen)); opacity: 0.72; margin: 18px 0 6px; display: flex; align-items: center; gap: 8px; }
      #journal .anth-title::after, #help .anth-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(var(--lumen), 0.2), transparent); }
      #journal .journal-isle { font-variant: small-caps; letter-spacing: 0.04em; font-size: 14px; color: var(--ink-bright); opacity: 0.85; margin: 8px 0 2px; }
      #journal .anth-epigraph {
        font: italic 12px Georgia, serif; opacity: 0.5;
        margin: 4px 0 8px; padding-bottom: 10px;
        border-bottom: 1px solid rgba(var(--lumen), 0.14);
      }
      #journal .anth-empty { font: italic 13px Georgia, serif; opacity: 0.6; }
      #journal .anth-hint { font: 11px monospace; opacity: 0.45; margin-top: 12px; text-align: center; }
      #journal .inspect-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-start; }
      #journal .inspect-card { width: 84px; text-align: center; font: 11px monospace; }
      #journal .inspect-name { margin-top: 2px; color: var(--ink-bright); }
      #journal .inspect-traits { opacity: 0.6; margin-top: 2px; line-height: 1.4; }
      #journal canvas.journal-canvas { image-rendering: pixelated; width: 64px; height: 112px; }
      #picker {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(480px, 88vw); max-height: 72vh; overflow-y: auto;
        background: var(--panel); box-shadow: var(--frame);
        border-radius: var(--radius);
        padding: 18px 22px; color: var(--ink); font-family: var(--serif);
      }
      #picker .anth-title { font-variant: small-caps; letter-spacing: 0.08em; font-size: 19px; color: var(--ink-bright); }
      #picker .anth-epigraph {
        font: italic 12px Georgia, serif; opacity: 0.5;
        margin: 4px 0 12px; padding-bottom: 10px;
        border-bottom: 1px solid rgba(var(--lumen), 0.14);
      }
      #picker .isle-row { position: relative; padding: 7px 10px; margin: 2px -10px; border-radius: 6px; cursor: pointer; }
      #picker .isle-row:hover { background: rgba(var(--lumen), 0.06); }
      #picker .isle-forget {
        position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
        opacity: 0; transition: opacity 0.15s;
        font: 10px monospace; color: rgba(255, 180, 180, 0.85); cursor: pointer;
        background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 120, 120, 0.35);
        border-radius: 4px; padding: 2px 8px;
      }
      #picker .isle-row:hover .isle-forget { opacity: 1; }
      #picker .isle-forget:hover { background: rgba(255, 120, 120, 0.18); }
      #picker .isle-row.here { cursor: default; }
      #picker .isle-row.here:hover { background: transparent; }
      #picker .isle-name { font: 13px monospace; color: var(--ink-bright); }
      #picker .isle-place { font: 11px monospace; opacity: 0.6; margin-top: 2px; }
      #picker .isle-when { font: italic 12px Georgia, serif; opacity: 0.55; margin-top: 1px; line-height: 1.4; }
      #picker .anth-empty { font: italic 13px Georgia, serif; opacity: 0.6; margin-top: 6px; }
      #picker .anth-hint { font: 11px monospace; opacity: 0.45; margin-top: 12px; text-align: center; }
      #help {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(600px, 88vw); max-height: 78vh; overflow-y: auto;
        background: var(--panel); box-shadow: var(--frame);
        border-radius: var(--radius);
        padding: 18px 22px; color: var(--ink); font-family: var(--serif);
      }
      #help .anth-title:first-child { margin-top: 0; }
      #help .anth-epigraph {
        font: italic 12px Georgia, serif; opacity: 0.5;
        margin: 4px 0 8px; padding-bottom: 10px;
        border-bottom: 1px solid rgba(var(--lumen), 0.14);
      }
      #help .help-welcome {
        font: italic 13px Georgia, serif; line-height: 1.5;
        color: rgba(255, 255, 255, 0.85); margin: 8px 0 2px;
      }
      #help .help-row { display: flex; gap: 12px; font: 12px monospace; line-height: 1.6; margin-top: 3px; }
      #help .help-key { color: var(--ink-bright); flex: 0 0 96px; text-align: right; white-space: nowrap; }
      #help .help-what { opacity: 0.7; }
      #help .help-line { font: 12px monospace; opacity: 0.7; line-height: 1.6; margin-top: 6px; }
      #help .help-refs {
        display: block; text-align: center; margin-top: 16px; padding-top: 14px;
        font: 12px monospace; color: rgba(var(--lumen), 0.9); text-decoration: none;
        border-top: 1px solid rgba(var(--lumen), 0.14);
      }
      #help .help-refs:hover { color: rgba(167, 236, 214, 1); text-decoration: underline; }
      #help .anth-hint { font: 11px monospace; opacity: 0.45; margin-top: 14px; text-align: center; }
      /* the build stamp — which version you're playing, whispered at a card's foot */
      #help .build-stamp, #menu .build-stamp {
        font: 10px var(--mono); letter-spacing: 0.04em; text-align: center;
        color: rgba(var(--lumen), 0.32); margin-top: 8px; user-select: text;
      }
      #menu {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(540px, 90vw); max-height: 82vh; overflow-y: auto;
        background: var(--panel);
        border-radius: 4px; padding: 20px 24px; color: var(--ink); font-family: Georgia, "Iowan Old Style", serif;
        box-shadow: var(--frame);
      }
      #menu .anth-title { font-variant: small-caps; letter-spacing: 0.08em; font-size: 20px; color: var(--ink-bright); }
      #menu .anth-epigraph {
        font: italic 12.5px Georgia, serif; color: rgba(228, 236, 242, 0.5);
        margin: 4px 0 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(var(--lumen), 0.16);
      }
      #menu .menu-section {
        font: 10px ui-monospace, Menlo, monospace; letter-spacing: 0.24em; text-transform: uppercase;
        color: rgb(var(--lumen)); opacity: 0.72; margin: 16px 0 5px; display: flex; align-items: center; gap: 8px;
      }
      #menu .menu-section::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(var(--lumen), 0.2), transparent); }
      #menu .menu-line { font: 13px Georgia, serif; color: rgba(228, 236, 242, 0.66); line-height: 1.55; }
      #menu .menu-row {
        display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
        padding: 7px 10px; margin: 1px -10px; border-radius: 6px; cursor: pointer;
        font: 14px Georgia, serif; line-height: 1.5; color: rgba(228, 236, 242, 0.82);
      }
      #menu .menu-row:hover { background: rgba(var(--lumen), 0.06); }
      #menu .menu-row .menu-key {
        color: rgb(var(--lumen)); flex: 0 0 auto; border: 1px solid rgba(var(--lumen), 0.3);
        border-radius: 4px; padding: 0 7px; font: 11px ui-monospace, Menlo, monospace;
      }
      #menu .menu-row.disabled { cursor: default; opacity: 0.4; }
      #menu .menu-row.disabled:hover { background: transparent; }
      #menu .menu-row.built { cursor: default; color: rgba(167, 236, 214, 0.85); }
      #menu .menu-row.built:hover { background: transparent; }
      #menu .menu-row.abandon { color: rgba(var(--rose), 0.85); }
      #menu .menu-row.abandon:hover { background: rgba(231, 120, 130, 0.14); }
      #menu .anth-hint { font: 11px ui-monospace, Menlo, monospace; color: rgba(228, 236, 242, 0.4); margin-top: 14px; text-align: center; }
      #title {
        display: none;
        position: fixed; inset: 0; z-index: 20;
        flex-direction: column; align-items: center; justify-content: center;
        gap: 4px;
        background: radial-gradient(120% 90% at 50% 42%, rgba(var(--abyss), 0.35), rgba(var(--abyss), 0.86));
        font-family: var(--serif);
      }
      #title.on { display: flex; }
      #title .title-wordmark {
        font-variant: small-caps; letter-spacing: 0.18em; font-size: 64px;
        color: var(--ink-bright); text-shadow: 0 0 34px rgba(var(--lumen), 0.4);
      }
      #title .title-tagline {
        font: italic 15px var(--serif); color: rgba(228, 236, 242, 0.7); margin-bottom: 26px;
      }
      #title .title-rows { display: flex; flex-direction: column; gap: 2px; min-width: 320px; }
      #title .title-row {
        display: block; text-align: center; cursor: pointer;
        font: 18px var(--serif); color: rgba(228, 236, 242, 0.82);
        padding: 9px 16px; border-radius: var(--radius);
      }
      #title .title-row:hover {
        color: var(--ink-bright);
        background: rgba(var(--lumen), 0.08);
        box-shadow: inset 0 0 0 1px rgba(var(--lumen), 0.22);
      }
      #title .title-stamp {
        margin-top: 26px; font: 10px var(--mono); letter-spacing: 0.04em;
        color: rgba(var(--lumen), 0.32); user-select: text;
      }
      /* the front door is up: the backdrop plays on, but its HUD stays hidden */
      body.titling #hud, body.titling #seed-label, body.titling #dev, body.titling #murmur, body.titling #map {
        display: none !important;
      }
      #web {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(820px, 94vw); max-height: 84vh; overflow-y: auto;
        background: var(--panel); box-shadow: var(--frame);
        border-radius: var(--radius);
        padding: 18px 22px; color: var(--ink); font-family: var(--serif);
      }
      #web .anth-title { font-variant: small-caps; letter-spacing: 0.08em; font-size: 19px; color: var(--ink-bright); }
      #web .anth-epigraph {
        font: italic 12.5px Georgia, serif; opacity: 0.62; line-height: 1.5;
        margin: 6px 0 12px; padding-bottom: 10px;
        border-bottom: 1px solid rgba(var(--lumen), 0.14);
      }
      #web .web-line { font: 12px monospace; opacity: 0.72; line-height: 1.6; margin: 2px 0; }
      #web .web-empty { font: italic 12.5px Georgia, serif; opacity: 0.62; line-height: 1.5; margin-top: 8px; }
      #web .web-chain {
        margin: 10px 0; padding: 10px; border-radius: 8px;
        background: rgba(var(--lumen), 0.03); border: 1px solid rgba(var(--lumen), 0.1);
      }
      #web .web-chain.live { border-color: rgba(var(--lumen), 0.5); background: rgba(var(--lumen), 0.06); }
      #web .web-firing { font: 11px monospace; color: rgba(var(--lumen), 0.95); margin-bottom: 6px; }
      #web .web-flow {
        display: flex; align-items: flex-start; gap: 4px; flex-wrap: nowrap;
        overflow-x: auto; padding-bottom: 4px;
      }
      #web .web-node { width: 96px; flex: 0 0 auto; text-align: center; }
      #web .web-node canvas { image-rendering: pixelated; width: 48px; height: 84px; }
      #web .web-node canvas.web-critter { width: auto; height: 54px; margin-top: 24px; }
      #web .web-name { font: 11px monospace; color: var(--ink-bright); margin-top: 2px; line-height: 1.3; }
      #web .web-where { font: 10px monospace; opacity: 0.55; margin-top: 1px; line-height: 1.3; }
      #web .web-arrow {
        flex: 0 0 auto; width: 92px; align-self: center; text-align: center;
        font: 10px monospace; opacity: 0.7;
      }
      #web .web-arrow-head { font-size: 16px; opacity: 0.8; }
      #web .web-arrow-label { line-height: 1.3; margin-top: 2px; }
      #web .web-loop { font: 11px monospace; color: rgba(200, 224, 167, 0.85); margin-top: 6px; }
      #web .anth-hint { font: 11px monospace; opacity: 0.45; margin-top: 14px; text-align: center; }
      /* the island's ledger — the census & food-web dashboard (G), codex-styled */
      #charts {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(880px, 95vw); max-height: 90vh; overflow-y: auto;
        background: linear-gradient(180deg, var(--tide-hi) 0%, rgba(11, 22, 31, 0.98) 45%, var(--tide-lo) 100%);
        border-radius: 4px; padding: 20px 24px 22px; color: var(--ink);
        font-family: Georgia, "Iowan Old Style", serif;
        box-shadow: var(--frame);
      }
      #charts .ch-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
        border-bottom: 1px solid rgba(var(--lumen), 0.16); padding-bottom: 10px; margin-bottom: 14px; }
      #charts .ch-title { font-variant: small-caps; letter-spacing: 0.08em; font-size: 20px; color: var(--ink-bright); }
      #charts .ch-sub { font: 11px ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: 0.06em; color: rgba(228, 236, 242, 0.5); }
      #charts .ch-tiles { display: flex; flex-wrap: wrap; gap: 8px; }
      #charts .ch-tile { flex: 1 1 0; min-width: 96px; padding: 9px 12px; border-radius: 7px;
        background: linear-gradient(180deg, rgba(var(--lumen), 0.06), rgba(8, 15, 22, 0.4));
        box-shadow: inset 0 0 0 1px rgba(var(--lumen), 0.1); }
      #charts .ch-tile.accent { box-shadow: inset 0 0 0 1px rgba(var(--firefly), 0.35); }

      #charts .ch-section { font: 10px ui-monospace, Menlo, monospace; letter-spacing: 0.24em; text-transform: uppercase;

      /* the backpack (B) — a JRPG inventory screen: browse & load the seed bank */
      #backpack {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(720px, 92vw); max-height: 86vh; overflow-y: auto;

        border-radius: 4px; padding: 20px 24px; color: var(--ink); font-family: Georgia, "Iowan Old Style", serif;
        box-shadow: var(--frame);

      #backpack .bp-row.static { cursor: default; color: rgba(228, 236, 242, 0.5); }
      #backpack .bp-row:not(.static):hover { background: rgba(var(--lumen), 0.05); }

      #backpack .bp-cur { color: rgb(var(--lumen)); text-align: center; filter: drop-shadow(0 0 5px rgb(var(--lumen))); }

      #backpack .bp-name { font-family: Georgia, serif; display: flex; align-items: baseline; gap: 8px; }
      #backpack .bp-tag { font: 9px ui-monospace, Menlo, monospace; letter-spacing: 0.1em; text-transform: uppercase; color: rgb(var(--firefly)); border: 1px solid rgba(var(--firefly), 0.4); border-radius: 3px; padding: 1px 5px; }
      #backpack .bp-ct { font: 13px ui-monospace, Menlo, monospace; color: rgba(228, 236, 242, 0.55); font-variant-numeric: tabular-nums; }

      #backpack .bp-empty, #backpack .bp-empty2 { font: italic 12.5px Georgia, serif; color: rgba(228, 236, 242, 0.45); padding: 4px 8px; display: block; }
      #backpack .bp-mats { display: flex; flex-wrap: wrap; gap: 6px 14px; padding: 2px 8px; font: 12px ui-monospace, Menlo, monospace; color: rgba(228, 236, 242, 0.6); }
      #backpack .bp-mat b { color: var(--ink-bright); font-weight: 400; }
      #backpack .bp-plate { border-left: 1px solid rgba(var(--lumen), 0.12); padding-left: 16px; display: flex; flex-direction: column; }
      #backpack .bp-plate-dot { align-self: center; width: 56px; height: 56px; border-radius: 12px; margin-top: 8px; box-shadow: 0 0 24px currentColor, inset 0 0 0 1px rgba(255, 255, 255, 0.2); }
      #backpack .bp-plate-name { font-variant: small-caps; letter-spacing: 0.05em; font-size: 22px; text-align: center; color: var(--ink-bright); margin: 14px 0 2px; }
      #backpack .bp-plate-kind { font: 10px ui-monospace, Menlo, monospace; letter-spacing: 0.2em; text-transform: uppercase; color: rgb(var(--lumen)); opacity: 0.7; text-align: center; margin-bottom: 12px; }
      #backpack .bp-rule { height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--lumen), 0.3), transparent); margin-bottom: 13px; }
      #backpack .bp-plate-lore { font: italic 14px Georgia, serif; line-height: 1.6; color: rgba(228, 236, 242, 0.82); }

      #backpack .bp-plate-acts { margin-top: auto; padding-top: 16px; display: flex; gap: 10px; }
      #backpack .bp-act { font: 11px ui-monospace, Menlo, monospace; letter-spacing: 0.06em; color: rgba(228, 236, 242, 0.7); background: rgba(var(--lumen), 0.08); border: 1px solid rgba(var(--lumen), 0.25); border-radius: 5px; padding: 6px 12px; }

      /* the island's map (O) — the full-colour isle, promoted from ?overview */

      #forge {
        display: none;
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);

      #forge .forge-head { display: flex; flex-direction: column; gap: 2px; }

        gap: 12px; padding: 6px 2px;
      }
      #forge .forge-row + .forge-row { border-top: 1px solid rgba(var(--lumen), 0.08); }
      #forge .forge-label { font: 13px var(--serif); color: rgba(228, 236, 242, 0.72); flex: 0 0 auto; }
      #forge .forge-inline { display: flex; align-items: center; gap: 8px; }
      #forge .forge-num, #forge .forge-select {
        font: 13px var(--mono); color: var(--ink-bright);

      #forge .forge-btn {
